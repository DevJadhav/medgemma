# @package tuning
# Population Based Training Configuration
# Adaptive hyperparameter optimization during training

enabled: true
scheduler: pbt

# PBT-specific settings
pbt:
  # Time between perturbations (in training iterations)
  perturbation_interval: 100

  # Quantile for determining exploitation (bottom 25% get replaced)
  quantile_fraction: 0.25

  # Probability of resampling vs perturbing during exploration
  resample_probability: 0.25

  # Perturbation factors for continuous hyperparameters
  perturbation_factors:
    - 0.8
    - 1.0
    - 1.2

  # Custom exploration function
  custom_explore_fn: null

  # Synchronous vs asynchronous PBT
  synch: false

  # Whether to log config changes
  log_config: true

# Population size (number of parallel trials)
num_samples: 16
max_concurrent_trials: 16  # Run full population in parallel

metric: eval_loss
mode: min

resources_per_trial:
  cpu: 4
  gpu: 1

# Hyperparameters to mutate during training
hyperparam_mutations:
  learning_rate:
    type: loguniform
    lower: 1e-6
    upper: 1e-3

  weight_decay:
    type: loguniform
    lower: 1e-5
    upper: 0.1

  lora_dropout:
    type: uniform
    lower: 0.0
    upper: 0.3

# Initial search space (for starting population)
search_space:
  learning_rate:
    type: loguniform
    lower: 1e-5
    upper: 5e-4

  lora_r:
    type: choice
    values: [32, 64, 128]

  lora_alpha:
    type: choice
    values: [64, 128, 256]

  per_device_train_batch_size:
    type: choice
    values: [1, 2]

  gradient_accumulation_steps:
    type: choice
    values: [8, 16]

  warmup_ratio:
    type: uniform
    lower: 0.01
    upper: 0.1

  weight_decay:
    type: loguniform
    lower: 1e-4
    upper: 0.1

  lora_dropout:
    type: uniform
    lower: 0.0
    upper: 0.2

checkpoint:
  num_to_keep: 2  # PBT needs checkpoints for exploitation
  checkpoint_score_attribute: ${tuning.metric}
  checkpoint_score_order: ${tuning.mode}

failure:
  max_failures: 5  # Higher tolerance for PBT
  fail_fast: false

storage_path: ${project.output_dir}/tune

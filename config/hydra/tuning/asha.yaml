# @package tuning
# ASHA Hyperparameter Tuning Configuration
# Asynchronous Successive Halving Algorithm for efficient HPO

enabled: true
scheduler: asha

# ASHA-specific settings
asha:
  # Minimum training iterations before early stopping
  grace_period: 100

  # Maximum training iterations
  max_t: 5000

  # Halving rate (1/reduction_factor survive each round)
  reduction_factor: 3

  # Number of brackets (higher = more exploration)
  brackets: 1

  # Stop trials reporting worse than top-k
  stop_last_trials: true

# General tuning settings
num_samples: 50
max_concurrent_trials: 8

# Optimization metric
metric: eval_loss
mode: min  # minimize eval_loss

# Search algorithm
search_algorithm: optuna  # optuna, hyperopt, random

# Resources per trial
resources_per_trial:
  cpu: 4
  gpu: 1

# Search space
search_space:
  learning_rate:
    type: loguniform
    lower: 1e-5
    upper: 5e-4

  lora_r:
    type: choice
    values: [8, 16, 32, 64, 128]

  lora_alpha:
    type: choice
    values: [16, 32, 64, 128, 256]

  per_device_train_batch_size:
    type: choice
    values: [1, 2, 4]

  gradient_accumulation_steps:
    type: choice
    values: [4, 8, 16, 32]

  warmup_ratio:
    type: uniform
    lower: 0.01
    upper: 0.1

  weight_decay:
    type: loguniform
    lower: 1e-4
    upper: 0.1

  lora_dropout:
    type: uniform
    lower: 0.0
    upper: 0.2

# Checkpoint settings
checkpoint:
  num_to_keep: 3
  checkpoint_score_attribute: ${tuning.metric}
  checkpoint_score_order: ${tuning.mode}

# Failure handling
failure:
  max_failures: 3
  fail_fast: false

# Storage
storage_path: ${project.output_dir}/tune

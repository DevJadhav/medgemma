# @package tuning
# Hyperband Configuration
# Resource-efficient multi-fidelity hyperparameter optimization

enabled: true
scheduler: hyperband

# Hyperband-specific settings
hyperband:
  # Maximum training iterations
  max_t: 5000

  # Minimum iterations before stopping
  grace_period: 50

  # Halving rate
  reduction_factor: 3

  # Whether to stop trials early
  stop_last_trials: true

# Number of configurations to try
# Should be multiple of reduction_factor^max_brackets for efficiency
num_samples: 81
max_concurrent_trials: 16

metric: eval_loss
mode: min

search_algorithm: hyperopt  # hyperopt works well with Hyperband

resources_per_trial:
  cpu: 4
  gpu: 1

search_space:
  learning_rate:
    type: loguniform
    lower: 1e-5
    upper: 5e-4

  lora_r:
    type: choice
    values: [8, 16, 32, 64, 128]

  lora_alpha:
    type: choice
    values: [16, 32, 64, 128, 256]

  per_device_train_batch_size:
    type: choice
    values: [1, 2, 4]

  gradient_accumulation_steps:
    type: choice
    values: [4, 8, 16]

  warmup_ratio:
    type: uniform
    lower: 0.01
    upper: 0.1

  weight_decay:
    type: loguniform
    lower: 1e-4
    upper: 0.1

  lora_dropout:
    type: uniform
    lower: 0.0
    upper: 0.2

checkpoint:
  num_to_keep: 3
  checkpoint_score_attribute: ${tuning.metric}
  checkpoint_score_order: ${tuning.mode}

failure:
  max_failures: 3
  fail_fast: false

storage_path: ${project.output_dir}/tune

# @package model
# MedGemma 4B Model Configuration
# Suitable for single GPU or small multi-GPU setups

name: google/medgemma-4b-it
revision: main
torch_dtype: bfloat16
trust_remote_code: true
attn_implementation: flash_attention_2
use_cache: false  # Disable for training with gradient checkpointing

# Model architecture (for reference)
architecture:
  hidden_size: 3072
  num_attention_heads: 24
  num_key_value_heads: 8
  num_hidden_layers: 28
  intermediate_size: 8192
  vocab_size: 262144
  max_position_embeddings: 8192
  rope_theta: 10000.0

# Quantization settings (disabled by default for 4B)
quantization:
  enabled: false
  load_in_4bit: false
  load_in_8bit: false
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true

# Memory optimization
memory:
  gradient_checkpointing: true
  use_reentrant: false

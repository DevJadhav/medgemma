# @package training.deepspeed
# DeepSpeed ZeRO Stage 3 with CPU Offloading
# Maximum memory efficiency for large model training

enabled: true

config:
  # BF16 training
  bf16:
    enabled: true

  # ZeRO Stage 3 optimization
  zero_optimization:
    stage: 3

    # CPU offloading for optimizer states
    offload_optimizer:
      device: cpu
      pin_memory: true
      buffer_count: 4
      fast_init: false

    # CPU offloading for parameters
    offload_param:
      device: cpu
      pin_memory: true
      buffer_count: 5
      buffer_size: 1e8
      max_in_cpu: 1e9

    # Communication optimization
    overlap_comm: true
    contiguous_gradients: true

    # Bucket sizes for efficient communication
    reduce_bucket_size: 5e8
    stage3_prefetch_bucket_size: 5e8
    stage3_param_persistence_threshold: 1e6

    # Sub-group optimization
    sub_group_size: 1e9
    stage3_max_live_parameters: 1e9
    stage3_max_reuse_distance: 1e9

    # Gather optimization
    stage3_gather_16bit_weights_on_model_save: true
    round_robin_gradients: true

  # Auto-configured by Trainer
  gradient_accumulation_steps: auto
  gradient_clipping: auto
  train_micro_batch_size_per_gpu: auto

  # Optimizer settings
  zero_allow_untested_optimizer: true
  zero_force_ds_cpu_optimizer: false

  # Communication
  communication_data_type: bf16
  prescale_gradients: false

  # Activation checkpointing (handled by Trainer)
  activation_checkpointing:
    partition_activations: true
    cpu_checkpointing: false
    contiguous_memory_optimization: false
    number_checkpoints: null
    synchronize_checkpoint_boundary: false
    profile: false

  # Logging
  steps_per_print: 100
  wall_clock_breakdown: false

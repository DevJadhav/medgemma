# GRPO (Group Relative Policy Optimization) Configuration
# Group-relative rewards without separate reward model

# @package _global_
training:
  method: grpo

  # GRPO configuration
  grpo:
    group_size: 4
    num_generations: 4
    temperature: 0.9
    top_p: 0.95
    max_new_tokens: 256
    reward_aggregation: mean  # mean, max, or min
    normalize_rewards: true
    kl_coefficient: 0.1

  # LoRA for GRPO
  lora:
    r: 32
    lora_alpha: 64
    lora_dropout: 0.05
    bias: none
    task_type: CAUSAL_LM
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj

  # Training arguments
  args:
    num_train_epochs: 1
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16
    gradient_checkpointing: true
    optim: adamw_torch
    learning_rate: 1e-6
    weight_decay: 0.01
    lr_scheduler_type: cosine
    warmup_ratio: 0.1
    bf16: true
    logging_steps: 10
    save_steps: 100

# DoRA (Weight-Decomposed LoRA) Configuration
# Decomposes weight updates into magnitude and direction for better stability

# @package _global_
training:
  method: dora

  # DoRA configuration (extends LoRA)
  lora:
    r: 64
    lora_alpha: 128
    lora_dropout: 0.05
    bias: none
    task_type: CAUSAL_LM
    use_dora: true  # Enable DoRA
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj

  # Training arguments
  args:
    num_train_epochs: 3
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8
    gradient_checkpointing: true
    optim: adamw_torch_fused
    learning_rate: 2e-4
    weight_decay: 0.01
    lr_scheduler_type: cosine
    warmup_ratio: 0.03
    bf16: true
    logging_steps: 10
    save_steps: 500
    eval_steps: 500

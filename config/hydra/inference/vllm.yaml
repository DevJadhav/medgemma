# vLLM Inference Backend Configuration
# High throughput serving with PagedAttention

# @package _global_
inference:
  backend: vllm

  vllm:
    # Model settings
    tensor_parallel_size: 1
    pipeline_parallel_size: 1
    dtype: bfloat16
    trust_remote_code: true

    # Memory and batching
    gpu_memory_utilization: 0.9
    max_num_seqs: 256
    max_num_batched_tokens: 8192
    max_model_len: 8192

    # Optimization
    enable_prefix_caching: true
    enable_chunked_prefill: true
    enforce_eager: false
    swap_space: 4  # GB

    # Speculative decoding (optional)
    speculative_decoding:
      enabled: false
      draft_model: null
      num_speculative_tokens: 5

    # Quantization
    quantization:
      enabled: false
      method: null  # awq, gptq, squeezellm

  # Generation defaults
  generation:
    max_tokens: 2048
    temperature: 0.1
    top_p: 0.95
    top_k: 50
    repetition_penalty: 1.0
    stop_sequences: []

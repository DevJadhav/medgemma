name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Stage 1: Unit Tests (fast, parallel)
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"

      - name: Run linting
        run: |
          uv run ruff check medai_compass/ tests/
          uv run ruff format --check medai_compass/ tests/

      - name: Run type checking
        run: |
          uv run mypy medai_compass/ --ignore-missing-imports

      - name: Run unit tests
        run: |
          uv run pytest tests/ -v --ignore=tests/integration --ignore=tests/load \
            --cov=medai_compass --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  # Stage 2: Integration Tests (Phase 9)
  integration-test:
    runs-on: ubuntu-latest
    needs: unit-test
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv pip install -e ".[dev,monitoring]"

      - name: Run integration tests
        run: |
          uv run pytest tests/integration/ -v --tb=short \
            --ignore=tests/integration/test_api_orchestrator_integration.py \
            --ignore=tests/integration/test_multiagent_flow.py

      - name: Run tracing tests
        run: |
          uv run pytest tests/integration/test_otel_tracing.py -v

      - name: Run benchmarking tests
        run: |
          uv run pytest tests/integration/test_performance_benchmarking.py -v

      - name: Run security audit tests
        run: |
          uv run pytest tests/integration/test_security_audit.py -v

  # Stage 3: Load Tests (CI smoke only)
  load-test-smoke:
    runs-on: ubuntu-latest
    needs: unit-test
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv pip install -e ".[dev,monitoring]"

      - name: Run load test smoke tests
        run: |
          uv run pytest tests/integration/test_load_scenarios.py -v \
            -k "smoke or ci" --tb=short

  # Stage 4: Security Checks
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit

      - name: Check for security vulnerabilities
        run: |
          pip install -e .
          safety check || true  # Don't fail on known issues during development

      - name: Run security linting
        run: |
          bandit -r medai_compass/ -ll || true  # Report but don't fail during development

# MedAI Compass - Production Docker Compose
# HIPAA-compliant multi-service deployment




























































]    "get_gpu_metrics",    "log_training_step",    # Metrics    "run_training_pipeline",    # Pipeline    "create_training_dataset",    "MedicalDataPipeline",    # Data    "get_latest_checkpoint",    "load_checkpoint",    "save_checkpoint",    "CheckpointManager",    # Checkpoints    "TrainingResult",    "TrainingConfig",    "MedGemmaTrainer",    # Training    "ModelNotFoundError",    "get_training_config",    "select_model",    # Model selection__all__ = [)    log_training_step,    get_gpu_metrics,from .metrics import ()    run_training_pipeline,from .pipeline import ()    create_training_dataset,    MedicalDataPipeline,from .data_pipeline import ()    save_checkpoint,    load_checkpoint,    get_latest_checkpoint,    CheckpointManager,from .checkpoint_manager import ()    TrainingResult,    TrainingConfig,    MedGemmaTrainer,from .ray_trainer import ()    select_model,    get_training_config,    ModelNotFoundError,from .model_selector import ("""- 27B model: 8x H100 GPUs with DeepSpeed ZeRO-3- 4B model: Single H100 GPUTraining is performed on Modal cloud GPUs:with support for both MedGemma 4B IT and MedGemma 27B IT models.This module provides distributed training orchestration using Ray Train,# 
# Usage:
#   docker-compose up -d                    # Core services
#   docker-compose --profile gpu up -d      # With GPU inference
#   docker-compose --profile logging up -d  # With ELK logging
#   docker-compose --profile all up -d      # Everything

services:
  # =========================================================================
  # Nginx Reverse Proxy (TLS Termination)
  # =========================================================================
  nginx:
    image: nginx:alpine
    container_name: medai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - certbot-data:/var/www/certbot:ro
    depends_on:
      - api
      - frontend
    networks:
      - medai-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================================================================
  # Frontend (Next.js)
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      args:
        - API_URL=http://api:8000
    container_name: medai-frontend
    restart: unless-stopped
    environment:
      - API_URL=http://api:8000
      - NODE_ENV=production
    depends_on:
      - api
    networks:
      - medai-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================================================================
  # API Server
  # =========================================================================
  api:
    build:
      context: .
      target: production
    container_name: medai-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-medai_compass}
      - POSTGRES_USER=${POSTGRES_USER:-medai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - PHI_ENCRYPTION_KEY=${PHI_ENCRYPTION_KEY}
      # Modal GPU configuration (default for macOS/no local GPU)
      - MODAL_TOKEN_ID=${MODAL_TOKEN_ID}
      - MODAL_TOKEN_SECRET=${MODAL_TOKEN_SECRET}
      - PREFER_MODAL_GPU=${PREFER_MODAL_GPU:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - medai-network
    volumes:
      - ./data:/data:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # =========================================================================
  # vLLM Inference Server (for MedGemma)
  # =========================================================================
  vllm:
    image: vllm/vllm-openai:latest
    container_name: medai-vllm
    restart: unless-stopped
    ports:
      - "${VLLM_PORT:-8080}:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - model-cache:/root/.cache/huggingface
    command: >
      --model google/medgemma-4b-it --dtype half --max-model-len 8192 --gpu-memory-utilization 0.9
    networks:
      - medai-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    profiles:
      - gpu

  # =========================================================================
  # Triton Inference Server (Alternative)
  # =========================================================================
  triton:
    image: nvcr.io/nvidia/tritonserver:24.01-py3
    container_name: medai-triton
    restart: unless-stopped
    ports:
      - "${TRITON_HTTP_PORT:-8001}:8000"
      - "${TRITON_GRPC_PORT:-8002}:8001"
      - "${TRITON_METRICS_PORT:-8003}:8002"
    volumes:
      - ./models:/models
    command: [ "tritonserver", "--model-repository=/models" ]
    networks:
      - medai-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    profiles:
      - gpu

  # =========================================================================
  # PostgreSQL Database
  # =========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: medai-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-medai_compass}
      - POSTGRES_USER=${POSTGRES_USER:-medai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - medai-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medai} -d ${POSTGRES_DB:-medai_compass}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # =========================================================================
  # Redis Cache
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: medai-redis
    restart: unless-stopped
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes" ]
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - medai-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # =========================================================================
  # MinIO Object Storage (for DICOM/images)
  # =========================================================================
  minio:
    image: minio/minio:latest
    container_name: medai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - medai-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================================================================
  # Prometheus (Monitoring)
  # =========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: medai-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - medai-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  # =========================================================================
  # Grafana (Dashboards)
  # =========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: medai-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - medai-network
    depends_on:
      - prometheus

  # =========================================================================
  # Elasticsearch (Log Aggregation)
  # =========================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: medai-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    networks:
      - medai-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    profiles:
      - logging

  # =========================================================================
  # Kibana (Log Visualization)
  # =========================================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: medai-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    networks:
      - medai-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    profiles:
      - logging

  # =========================================================================
  # Celery Worker (Data Ingestion)
  # =========================================================================
  celery-worker:
    build:
      context: .
      target: production
    container_name: medai-celery-worker
    restart: unless-stopped
    command: celery -A medai_compass.workers.celery worker -l info -Q ingestion,downloads -c 4
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-medai_compass}
      - POSTGRES_USER=${POSTGRES_USER:-medai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - PHYSIONET_USERNAME=${PHYSIONET_USERNAME}
      - PHYSIONET_PASSWORD=${PHYSIONET_PASSWORD}
    depends_on:
      - redis
      - postgres
      - minio
    networks:
      - medai-network
    volumes:
      - ./data:/data
    deploy:
      resources:
        limits:
          memory: 2G

  # =========================================================================
  # Celery Beat (Scheduled Tasks)
  # =========================================================================
  celery-beat:
    build:
      context: .
      target: production
    container_name: medai-celery-beat
    restart: unless-stopped
    command: celery -A medai_compass.workers.celery beat -l info
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - redis
    networks:
      - medai-network

  # =========================================================================
  # Flower (Celery Monitoring)
  # =========================================================================
  flower:
    image: mher/flower:latest
    container_name: medai-flower
    restart: unless-stopped
    command: celery --broker=redis://:${REDIS_PASSWORD}@redis:6379/0 flower --port=5555
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      - redis
    networks:
      - medai-network
    profiles:
      - monitoring

  # =========================================================================
  # Postgres Exporter (Prometheus Metrics)
  # =========================================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: medai-postgres-exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-medai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-medai_compass}?sslmode=disable
    depends_on:
      - postgres
    networks:
      - medai-network
    profiles:
      - monitoring

  # =========================================================================
  # Redis Exporter (Prometheus Metrics)
  # =========================================================================
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: medai-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - redis
    networks:
      - medai-network
    profiles:
      - monitoring

  # =========================================================================
  # Ray Head Node (Training Orchestration)
  # =========================================================================
  ray-head:
    build:
      context: .
      dockerfile: docker/training.Dockerfile
      target: ray-head
    container_name: medai-ray-head
    restart: unless-stopped
    ports:
      - "${RAY_DASHBOARD_PORT:-8265}:8265"
      - "${RAY_CLIENT_PORT:-10001}:10001"
      - "${RAY_GCS_PORT:-6379}:6379"
    environment:
      - RAY_HEAD_ADDRESS=ray-head:6379
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - HF_TOKEN=${HF_TOKEN}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    volumes:
      - ray-data:/data
      - model-cache:/data/huggingface
      - ./config:/app/config:ro
    networks:
      - medai-network
    healthcheck:
      test: ["CMD", "ray", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 8G
    profiles:
      - training

  # =========================================================================
  # Ray Worker Node (Training Workers)
  # =========================================================================
  ray-worker:
    build:
      context: .
      dockerfile: docker/training.Dockerfile
      target: ray-worker
    container_name: medai-ray-worker
    restart: unless-stopped
    environment:
      - RAY_HEAD_ADDRESS=ray-head:6379
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - HF_TOKEN=${HF_TOKEN}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    volumes:
      - ray-data:/data
      - model-cache:/data/huggingface
      - ./config:/app/config:ro
    networks:
      - medai-network
    depends_on:
      ray-head:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 64G
        reservations:
          memory: 32G
    profiles:
      - training
      - gpu

  # =========================================================================
  # MLflow Tracking Server
  # =========================================================================
  mlflow:
    build:
      context: .
      dockerfile: docker/training.Dockerfile
      target: mlflow-server
    container_name: medai-mlflow
    restart: unless-stopped
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      - MLFLOW_BACKEND_URI=postgresql://${POSTGRES_USER:-medai}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
      - MLFLOW_ARTIFACT_ROOT=s3://mlflow-artifacts
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - medai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - training

# =============================================================================
# Networks
# =============================================================================
networks:
  medai-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
  redis-data:
  minio-data:
  model-cache:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
  certbot-data:
  data-volume:
  ray-data:
